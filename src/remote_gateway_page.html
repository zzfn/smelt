<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>smelt 终端</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
  html, body { margin: 0; height: 100%; background: #111; color: #ddd; overflow: hidden; }
  #bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 2;
    display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
    padding: 4px 8px; background: rgba(0,0,0,.75); font: 12px/1.4 monospace;
  }
  #bar a { color: #6cf; text-decoration: none; }
  #status { color: #888; margin-left: auto; }
  #term {
    position: absolute; top: 28px; left: 0; right: 0; bottom: 0;
    padding: 4px; box-sizing: border-box;
  }
  body.has-toolbar #term { bottom: 44px; }
  #toolbar {
    display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 2;
    gap: 4px; padding: 6px 8px; background: #1a1a1a; border-top: 1px solid #333;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  body.has-toolbar #toolbar { display: flex; }
  #toolbar button {
    flex: 0 0 auto; border: 1px solid #444; background: #222; color: #ddd;
    border-radius: 6px; padding: 8px 10px; font: 13px monospace; min-width: 2.4rem;
  }
  #toolbar button:active { background: #333; }
</style>
</head>
<body>
<div id="bar">
  <a id="back" href="#">← 列表</a>
  <a id="console" href="#">操作台</a>
  <span id="status">连接中…</span>
</div>
<div id="term"></div>
<div id="toolbar" aria-label="终端快捷键">
  <button type="button" data-key="esc">Esc</button>
  <button type="button" data-key="tab">Tab</button>
  <button type="button" data-key="ctrlc">^C</button>
  <button type="button" data-key="ctrld">^D</button>
  <button type="button" data-key="up">↑</button>
  <button type="button" data-key="down">↓</button>
  <button type="button" data-key="left">←</button>
  <button type="button" data-key="right">→</button>
  <button type="button" data-key="enter">↵</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script>
  // ID/TOKEN 由网关渲染时替换（js_string_literal）；WRITE_ENABLED 是布尔字面量。
  const ID = __ID_JSON__;
  const TOKEN = __TOKEN_JSON__;
  const WRITE_ENABLED = __WRITE_ENABLED__;

  const statusEl = document.getElementById('status');
  document.getElementById('back').href = `/?token=${encodeURIComponent(TOKEN)}`;
  document.getElementById('console').href =
    `/s/${encodeURIComponent(ID)}/console?token=${encodeURIComponent(TOKEN)}`;

  if (WRITE_ENABLED) document.body.classList.add('has-toolbar');

  const term = new Terminal({
    convertEol: true,
    disableStdin: !WRITE_ENABLED,
    cursorBlink: WRITE_ENABLED,
    fontSize: 13,
    theme: { background: '#111' },
  });
  term.open(document.getElementById('term'));

  // 可写时：xterm onData → POST /input。stream WS 只搬画面，不混输入，避免和
  // 只读旁观语义缠在一起。发送失败不阻塞后续按键；状态栏短暂提示。
  let sendBusy = 0;
  async function sendInput(data) {
    if (!WRITE_ENABLED || !data) return;
    sendBusy++;
    try {
      const resp = await fetch(
        `/s/${encodeURIComponent(ID)}/input?token=${encodeURIComponent(TOKEN)}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data }),
        }
      );
      if (!resp.ok) {
        const t = await resp.text();
        statusEl.textContent = `写入失败：${t || resp.status}`;
        return;
      }
      const body = await resp.json().catch(() => ({}));
      if (body.ok === false) {
        statusEl.textContent = `写入失败：${body.err || '未知'}`;
      }
    } catch (e) {
      statusEl.textContent = '写入失败（网络）';
    } finally {
      sendBusy--;
    }
  }

  const KEY_SEQ = {
    esc: '\x1b',
    tab: '\t',
    ctrlc: '\x03',
    ctrld: '\x04',
    up: '\x1b[A',
    down: '\x1b[B',
    left: '\x1b[D',
    right: '\x1b[C',
    enter: '\r',
  };

  if (WRITE_ENABLED) {
    term.onData((data) => { sendInput(data); });
    document.querySelectorAll('#toolbar button').forEach((btn) => {
      btn.addEventListener('click', (ev) => {
        ev.preventDefault();
        const seq = KEY_SEQ[btn.getAttribute('data-key')];
        if (seq) sendInput(seq);
        term.focus();
      });
    });
  }

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}/s/${encodeURIComponent(ID)}/stream?token=${encodeURIComponent(TOKEN)}`;

  let retryDelay = 1000;
  const MAX_RETRY_DELAY = 8000;

  function connect() {
    const ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      term.reset();
      statusEl.textContent = WRITE_ENABLED ? '可写 · 实时' : '只读观战';
      retryDelay = 1000;
      if (WRITE_ENABLED) term.focus();
    };
    ws.onclose = () => {
      const s = Math.round(retryDelay / 1000);
      statusEl.textContent = `连接断开，${s}s 后重连…`;
      setTimeout(connect, retryDelay);
      retryDelay = Math.min(retryDelay * 2, MAX_RETRY_DELAY);
    };
    ws.onerror = () => { ws.close(); };
    ws.onmessage = (ev) => {
      if (typeof ev.data === 'string') {
        const meta = JSON.parse(ev.data);
        if (meta.cols && meta.rows) term.resize(meta.cols, meta.rows);
        return;
      }
      term.write(new Uint8Array(ev.data));
    };
  }

  connect();
</script>
</body>
</html>
